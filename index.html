<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village de Seraincourt 3D</title>
    <style>
        body { margin: 0; background-color: #0b0e14; overflow: hidden; font-family: sans-serif; color: white; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 25px; border-radius: 15px;
            z-index: 100; text-align: center; border: 1px solid #3498db;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div id="status" style="font-size: 18px; margin-bottom: 10px;">Chargement du village...</div>
        <div id="percent" style="font-size: 30px; font-weight: bold; color: #3498db;">0%</div>
    </div>
    
    <canvas id="canvas"></canvas>

    <script type="module">
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@latest/dist/index.es.min.js";

        async function main() {
            const canvas = document.getElementById("canvas");
            const renderer = new SPLAT.WebGLRenderer(canvas);
            const scene = new SPLAT.Scene();
            const camera = new SPLAT.Camera();
            const controls = new SPLAT.OrbitControls(camera, canvas);
            const percent = document.getElementById("percent");

            renderer.setSize(window.innerWidth, window.innerHeight);

            try {
                // Chargement du fichier
                const splat = await SPLAT.Loader.LoadAsync("model.splat", scene, (p) => {
                    percent.innerText = Math.round(p * 100) + "%";
                });

                // On cache le loader
                document.getElementById("loader").style.display = "none";

                // RECENTRAGE SÉCURISÉ (évite l'erreur 'x')
                if (splat.data && splat.data.avgPosition) {
                    const center = splat.data.avgPosition;
                    splat.position = new SPLAT.Vector3(-center.x, -center.y, -center.z);
                } else {
                    console.log("Impossible de trouver le centre automatiquement, utilisation de la position par défaut");
                }

                // Configuration de la caméra
                camera.position = new SPLAT.Vector3(0, 50, 150); 
                controls.target = new SPLAT.Vector3(0, 0, 0);

                const frame = () => {
                    controls.update();
                    renderer.render(scene, camera);
                    requestAnimationFrame(frame);
                };
                requestAnimationFrame(frame);

            } catch (error) {
                console.error(error);
                document.getElementById("status").innerText = "Erreur de rendu";
                document.getElementById("percent").innerText = "Détails en console";
            }

            window.addEventListener("resize", () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        main();
    </script>
</body>
</html>
