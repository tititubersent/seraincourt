<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village 3D - Seraincourt</title>
    <!-- On utilise le moteur 3D officiel de Google -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #111; overflow: hidden; }
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #111;
        }
        .error-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: sans-serif; display: none; text-align: center;
        }
    </style>
</head>
<body>

    <!-- On lui dit de charger model.splat, de centrer automatiquement et de permettre de tourner avec la souris -->
    <model-viewer 
        id="village"
        src="model.splat" 
        camera-controls 
        auto-rotate
        shadow-intensity="1"
        alt="Village de Seraincourt 3D"
        loading="eager">
        
        <div id="error" class="error-msg">
            Impossible de trouver le fichier "model.splat".<br>
            Vérifiez le nom du fichier sur GitHub.
        </div>
    </model-viewer>

    <script>
        const viewer = document.getElementById('village');
        const error = document.getElementById('error');
        
        // Si le fichier n'est pas trouvé sur ton GitHub
        viewer.addEventListener('error', (e) => {
            console.error("Erreur de chargement :", e);
            error.style.display = 'block';
        });
    </script>

</body>
</html>
