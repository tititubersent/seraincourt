<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seraincourt 3D</title>
    <style>
        body { margin: 0; background-color: #111; font-family: sans-serif; }
        #viewer { width: 100vw; height: 100vh; display: block; }
        .info { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="info">Chargement du village... (Utilisez la souris pour bouger)</div>

    <!-- On utilise un lecteur universel très stable -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <model-viewer 
        id="viewer"
        src="model.splat" 
        camera-controls 
        touch-action="none"
        autoplay
        ar
        shadow-intensity="1"
        camera-orbit="0deg 75deg 10m"
        field-of-view="30deg">
    </model-viewer>

</body>
</html>
