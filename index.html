<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Seraincourt 3D</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://quadjr.github.io/aframe-gaussian-splatting/index.js"></script>
    <script src="https://unpkg.com/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
  </head>
  
  <body style="margin: 0; background-color: #000;">
    <a-scene>
      
      <a-entity gaussian_splatting="src: model.splat;" position="0 0 0"></a-entity>

      <!-- J'ai passé minDistance à 0.1 pour te laisser zoomer à fond 
           et j'ai rapproché un peu la position de départ (initialPosition: 0 5 15) -->
      <a-entity camera 
                look-controls="enabled: false"
                orbit-controls="target: 0 0 0; minDistance: 0.1; maxDistance: 150; initialPosition: 0 5 15;">
      </a-entity>

    </a-scene>
  </body>
</html>
