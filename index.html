<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Village de Seraincourt</title>
    <!-- On utilise la version stable d'A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- Le script "lecteur" original -->
    <script src="https://quadjr.github.io/aframe-gaussian-splatting/index.js"></script>
  </head>
  <body style="margin: 0; background-color: #000;">
    <a-scene>
      <!-- Le village : On ne touche à rien -->
      <a-entity gaussian_splatting="src: model.splat;" position="0 1.5 -5"></a-entity>

      <!-- La caméra : On la met juste devant -->
      <a-entity camera look-controls wasd-controls position="0 1.5 0"></a-entity>
    </a-scene>
  </body>
</html>
