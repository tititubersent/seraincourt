<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Seraincourt 3D</title>
    <!-- On utilise uniquement ce qui a fonctionné lors de ta capture d'écran réussie -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://quadjr.github.io/aframe-gaussian-splatting/index.js"></script>
  </head>
  <body style="margin: 0; background-color: #000;">
    
    <div style="position: absolute; top: 10px; left: 10px; color: white; z-index: 100; font-family: sans-serif;">
        Chargement du village... Si l'erreur 'RangeError' persiste, le fichier est corrompu.
    </div>

    <a-scene renderer="antialias: false; precision: medium;">
      <!-- Le village avec les réglages de ta victoire -->
      <a-entity 
        gaussian_splatting="src: model.splat;" 
        rotation="0 0 0" 
        position="0 1.5 -5">
      </a-entity>

      <!-- Caméra simple -->
      <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>
    </a-scene>
  </body>
</html>
