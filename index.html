<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village de Seraincourt 3D</title>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="loading">Chargement du village...</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/@g-splat/gsplat@1.1.0/dist/index.js";

        const canvas = document.getElementById("canvas");
        const renderer = new SPLAT.WebGLRenderer(canvas);
        const scene = new SPLAT.Scene();
        const camera = new SPLAT.Camera();
        const controls = new SPLAT.OrbitControls(camera, canvas);

        async function main() {
            try {
                // Chargement du fichier
                await SPLAT.Loader.LoadAsync("model.splat", scene, (progress) => {
                    document.getElementById("loading").innerText = "Chargement : " + Math.round(progress * 100) + "%";
                });

                document.getElementById("loading").style.display = "none";

                // Animation
                const frame = () => {
                    controls.update();
                    renderer.render(scene, camera);
                    requestAnimationFrame(frame);
                };

                // On cadre la vue sur le village
                camera.position.set(0, 10, 20); 
                
                frame();
            } catch (error) {
                console.error(error);
                document.getElementById("loading").innerText = "Erreur de lecture du fichier .splat";
            }
        }

        main();

        window.addEventListener("resize", () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
