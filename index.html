<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village de Seraincourt 3D</title>
    <style>
        body { margin: 0; background-color: #0b0e14; overflow: hidden; font-family: sans-serif; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px;
            z-index: 100; text-align: center; border: 1px solid #3498db;
        }
    </style>
</head>
<body>

    <div id="loader">Chargement du village... <br><span id="percent">0%</span></div>
    <canvas id="canvas"></canvas>

    <script type="module">
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@latest/dist/index.es.min.js";

        const canvas = document.getElementById("canvas");
        const loader = document.getElementById("loader");
        const percent = document.getElementById("percent");

        async function main() {
            const renderer = new SPLAT.WebGLRenderer(canvas);
            const scene = new SPLAT.Scene();
            const camera = new SPLAT.Camera();
            const controls = new SPLAT.OrbitControls(camera, canvas);

            renderer.setSize(window.innerWidth, window.innerHeight);

            try {
                // Chargement du fichier
                const splat = await SPLAT.Loader.LoadAsync("model.splat", scene, (p) => {
                    percent.innerText = Math.round(p * 100) + "%";
                });

                // Cacher le loader
                loader.style.display = "none";

                // --- CALCUL DU CENTRE AUTOMATIQUE ---
                // On récupère la position moyenne de tous les points du village
                const center = splat.data.avgPosition;
                
                // On déplace le village au centre du monde (0,0,0) pour ne plus être perdu
                splat.position = new SPLAT.Vector3(-center.x, -center.y, -center.z);
                
                // On règle la caméra pour qu'elle regarde le centre
                camera.position = new SPLAT.Vector3(0, 30, 100); // Vue de haut et d'un peu loin
                controls.target = new SPLAT.Vector3(0, 0, 0);
                controls.update();

                // Boucle de rendu
                const frame = () => {
                    controls.update();
                    renderer.render(scene, camera);
                    requestAnimationFrame(frame);
                };

                requestAnimationFrame(frame);

                window.addEventListener("resize", () => {
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

            } catch (error) {
                loader.innerHTML = "Erreur : " + error.message;
            }
        }

        main();
    </script>
</body>
</html>
