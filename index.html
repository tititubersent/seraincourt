<script type="module">
import { Viewer } from "https://cdn.jsdelivr.net/npm/gaussian-splats-3d@0.4.3/build/gaussian-splats-3d.module.js";

const viewer = new Viewer({
  canvas: document.getElementById("canvas"),
  initialCameraPosition: [0, 0, 2],
  initialCameraLookAt: [0, 0, 0]
});

viewer.addSplatScene(
  "https://github.com/tititubersent/seraincourt/raw/refs/heads/main/model.splat",
  { progressiveLoad: true }
).then(() => {
  viewer.start();
}).catch((e) => {
  console.error("Erreur :", e);
});
</script>
