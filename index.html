<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Village de Seraincourt 3D</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; }
        model-viewer { width: 100vw; height: 100vh; }
        .loading { color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: sans-serif; }
    </style>
</head>
<body>

    <div class="loading">Chargement du village (60 Mo)...</div>

    <model-viewer 
        src="https://api.allorigins.win/raw?url=https://github.com/tititubersent/seraincourt/releases/download/v1/model.splat" 
        camera-controls 
        auto-rotate
        touch-action="pan-y">
    </model-viewer>

</body>
</html>
