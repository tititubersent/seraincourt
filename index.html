<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seraincourt 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #loader { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 20px; 
            border-radius: 10px; z-index: 100; 
            border: 1px solid #444; font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="loader">Connexion au serveur...</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        // Importation du moteur 3D (version ultra-stable)
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@1.1.10/+esm";

        const canvas = document.getElementById("canvas");
        const loader = document.getElementById("loader");

        async function main() {
            try {
                const renderer = new SPLAT.WebGLRenderer(canvas);
                const scene = new SPLAT.Scene();
                const camera = new SPLAT.Camera();
                const controls = new SPLAT.OrbitControls(camera, canvas);

                camera.position.z = 7; // Recule un peu la caméra au début
                loader.innerHTML = "Téléchargement du village (59 Mo)...";

                // Chargement du fichier .splat
                await SPLAT.Loader.LoadAsync("./model.splat", scene, (progress) => {
                    loader.innerHTML = "Chargement : " + (progress * 100).toFixed(0) + "%";
                });

                loader.style.display = "none";

                function frame() {
                    controls.update();
                    renderer.render(scene, camera);
                    requestAnimationFrame(frame);
                }
                requestAnimationFrame(frame);

            } catch (err) {
                console.error(err);
                loader.innerHTML = "❌ Erreur de chargement.<br>Vérifie que le fichier 'model.splat' est bien sur ton GitHub.";
            }
        }

        main();

        // Gestion du redimensionnement de la fenêtre
        window.addEventListener("resize", () => {
            // Le renderer est défini dans main, on ajuste la taille si besoin
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
