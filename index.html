<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village de Seraincourt 3D</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; font-family: sans-serif; }
        model-viewer {
            width: 100vw;
            height: 100vh;
            --progress-bar-color: #00ff00;
        }
        .instruction {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 10px 20px;
            border-radius: 20px; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div class="instruction">Utilisez la souris pour tourner et zoomer</div>

    <!-- On utilise model-viewer qui est le lecteur officiel de Google, très stable -->
    <model-viewer 
        src="model.splat" 
        ar 
        camera-controls 
        touch-action="none" 
        background-color="#000000"
        shadow-intensity="1"
        camera-orbit="0deg 75deg 10m"
        alt="Vue 3D de Seraincourt">
    </model-viewer>

</body>
</html>
