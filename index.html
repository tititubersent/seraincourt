<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Village 3D - Seraincourt</title>
    <!-- On charge la dernière version de model-viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #1a1a1a; }
        model-viewer {
            width: 100vw;
            height: 100vh;
            --poster-color: transparent;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="https://corsproxy.io/?https://github.com/tititubersent/seraincourt/releases/download/v1/model.splat" 
        camera-controls 
        touch-action="pan-y"
        auto-rotate
        ar>
        <div slot="poster" style="color: white; text-align: center; padding-top: 20%;">
            Chargement du village (60 Mo)... <br> Patientez quelques secondes.
        </div>
    </model-viewer>

</body>
</html>
