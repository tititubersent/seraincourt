<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://quadjr.github.io/aframe-gaussian-splatting/index.js"></script>
  </head>
  <body style="margin: 0; background-color: #000;">
    <a-scene>
      <!-- Le modèle brut, sans aucune modification -->
      <a-entity gaussian_splatting="src: model.splat;"></a-entity>

      <!-- La caméra de base -->
      <a-entity camera look-controls wasd-controls position="0 0 5"></a-entity>
    </a-scene>
  </body>
</html>
