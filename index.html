<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village de Seraincourt 3D</title>
    <style>
        body { margin: 0; background-color: #0b0e14; overflow: hidden; font-family: sans-serif; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #overlay {
            position: relative; z-index: 10; background: rgba(0,0,0,0.85);
            padding: 30px; border-radius: 15px; border: 2px solid #3498db;
            text-align: center; max-width: 80%;
        }
        .error { border-color: #e74c3c !important; color: #e74c3c; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="status" style="font-size: 1.2em; margin-bottom: 10px;">Vérification du fichier...</div>
        <div id="percent" style="font-size: 2.5em; font-weight: bold; color: #3498db;">0%</div>
        <div id="debug" style="font-size: 0.8em; margin-top: 15px; color: #888; font-family: monospace;"></div>
    </div>
    
    <canvas id="canvas"></canvas>

    <script type="module">
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@latest/dist/index.es.min.js";

        const status = document.getElementById("status");
        const percent = document.getElementById("percent");
        const debug = document.getElementById("debug");
        const overlay = document.getElementById("overlay");

        async function main() {
            const canvas = document.getElementById("canvas");
            const renderer = new SPLAT.WebGLRenderer(canvas);
            const scene = new SPLAT.Scene();
            const camera = new SPLAT.Camera();
            const controls = new SPLAT.OrbitControls(camera, canvas);
            renderer.setSize(window.innerWidth, window.innerHeight);

            const fileName = "model.splat";

            try {
                debug.innerText = "Test d'accès à " + fileName + "...";
                
                // 1. On vérifie d'abord si le fichier répond avant de lancer le moteur 3D
                const response = await fetch(fileName, { method: 'HEAD' });
                
                if (!response.ok) {
                    throw new Error("Le serveur répond avec une erreur " + response.status + " (Fichier introuvable)");
                }

                debug.innerText = "Fichier trouvé. Début du téléchargement...";
                status.innerText = "Téléchargement du Village...";

                // 2. Chargement réel
                const splat = await SPLAT.Loader.LoadAsync(fileName, scene, (p) => {
                    percent.innerText = Math.round(p * 100) + "%";
                });

                // 3. Succès
                overlay.style.display = "none";

                const center = splat.data.avgPosition;
                splat.position = new SPLAT.Vector3(-center.x, -center.y, -center.z);
                camera.position = new SPLAT.Vector3(0, 20, 100);
                controls.target = new SPLAT.Vector3(0, 0, 0);

                const frame = () => {
                    controls.update();
                    renderer.render(scene, camera);
                    requestAnimationFrame(frame);
                };
                requestAnimationFrame(frame);

            } catch (error) {
                console.error(error);
                overlay.classList.add("error");
                status.innerText = "ÉCHEC DU CHARGEMENT";
                percent.innerText = "Erreur";
                debug.innerText = error.message;
            }

            window.addEventListener("resize", () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        main();
    </script>
</body>
</html>
