<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Seraincourt 3D - FIX</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #canvas { width: 100vw; height: 100vh; }
        #info { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #444; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="info">
        <b>Village de Seraincourt</b><br>
        <span id="status">Initialisation...</span>
    </div>

    <canvas id="canvas"></canvas>

    <!-- On utilise Skypack : ça fusionne tout en UN SEUL fichier pour éviter ton erreur 404 -->
    <script type="module">
        import * as SPLAT from "https://cdn.skypack.dev/gsplat@1.1.0";

        const canvas = document.getElementById("canvas");
        const status = document.getElementById("status");

        async function start() {
            try {
                const renderer = new SPLAT.WebGLRenderer(canvas);
                const scene = new SPLAT.Scene();
                const camera = new SPLAT.Camera();
                const controls = new SPLAT.OrbitControls(camera, canvas);

                status.innerText = "Téléchargement du fichier .splat...";

                // Chargement du modèle
                await SPLAT.Loader.LoadAsync("model.splat", scene, (progress) => {
                    status.innerText = "Chargement : " + Math.round(progress * 100) + "%";
                });

                status.innerText = "Chargé ! Si c'est noir, bougez la souris/doigt pour chercher le modèle.";

                // POSITION DE LA CAMÉRA (Le secret de la visibilité)
                // On place la caméra un peu loin pour être sûr de voir quelque chose
                camera.position.set(0, 5, 15);
                
                const frame = () => {
                    controls.update();
                    renderer.render(scene, camera);
                    requestAnimationFrame(frame);
                };
                frame();

            } catch (e) {
                status.innerText = "ERREUR : Le fichier model.splat est introuvable ou corrompu.";
                console.error(e);
            }
        }

        start();

        window.addEventListener("resize", () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
