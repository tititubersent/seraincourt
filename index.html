<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village de Seraincourt 3D</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; overflow: hidden; font-family: sans-serif; color: white; }
        canvas { width: 100vw; height: 100vh; display: block; }
        .ui {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 15px 25px; border-radius: 30px;
            z-index: 10; text-align: center; border: 1px solid #444;
        }
    </style>
</head>
<body>

    <div class="ui" id="status-ui">
        <span id="label">Recherche du village...</span>
    </div>
    
    <canvas id="canvas"></canvas>

    <script type="module">
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@latest/dist/index.es.min.js";

        const canvas = document.getElementById("canvas");
        const label = document.getElementById("label");

        async function main() {
            const renderer = new SPLAT.WebGLRenderer(canvas);
            const scene = new SPLAT.Scene();
            const camera = new SPLAT.Camera();
            const controls = new SPLAT.OrbitControls(camera, canvas);

            renderer.setSize(window.innerWidth, window.innerHeight);

            try {
                // Chargement
                const model = await SPLAT.Loader.LoadAsync("model.splat", scene, (p) => {
                    label.innerText = "Chargement : " + Math.round(p * 100) + "%";
                });

                label.innerText = "Village chargé ! Utilisez la molette pour reculer si c'est noir.";

                // --- REGLAGES DE SECOURS ---
                // On recule la caméra très loin pour être sûr de voir quelque chose
                camera.position = new SPLAT.Vector3(0, 2, 10); 
                
                const frame = () => {
                    // On fait tourner la scène très lentement pour aider à repérer le modèle
                    scene.rotation.y += 0.005; 
                    
                    controls.update();
                    renderer.render(scene, camera);
                    requestAnimationFrame(frame);
                };

                window.addEventListener("resize", () => {
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

                requestAnimationFrame(frame);

            } catch (error) {
                label.innerText = "Erreur de rendu.";
            }
        }

        main();
    </script>
</body>
</html>
