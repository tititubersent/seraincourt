<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seraincourt 3D</title>
    <!-- Importation du module 3D -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; background-color: #000; }
        
        /* Écran de chargement */
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 10;
        }
        .progress-bar { width: 200px; height: 6px; background: #333; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        #update-bar { width: 0%; height: 100%; background: #00ff00; transition: width 0.2s; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div id="status-text">Chargement du village...</div>
        <div class="progress-bar"><div id="update-bar"></div></div>
    </div>

    <model-viewer 
        id="viewer"
        src="model.splat" 
        alt="Vue 3D de Seraincourt"
        camera-controls 
        auto-rotate
        rotation-speed="0.5"
        shadow-intensity="1"
        camera-orbit="0deg 75deg 105%">
    </model-viewer>

    <script>
        const viewer = document.querySelector('#viewer');
        const loadingScreen = document.querySelector('#loading-screen');
        const updateBar = document.querySelector('#update-bar');
        const statusText = document.querySelector('#status-text');

        // Mise à jour de la barre de progression
        viewer.addEventListener('progress', (event) => {
            const percent = Math.round(event.detail.totalProgress * 100);
            updateBar.style.width = percent + '%';
            statusText.innerText = `Téléchargement : ${percent}%`;
            if (percent >= 100) statusText.innerText = "Préparation de l'affichage...";
        });

        // Masquer l'écran de chargement quand c'est prêt
        viewer.addEventListener('load', () => {
            loadingScreen.style.display = 'none';
        });
    </script>
</body>
</html>
