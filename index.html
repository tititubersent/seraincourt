<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village de Seraincourt 3D</title>
    <!-- On utilise la version 3.4.0 qui gère très bien les Splats -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; font-family: sans-serif; }
        model-viewer {
            width: 100vw;
            height: 100vh;
            --progress-bar-color: #00ff00;
        }
        .instruction {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 10px 20px;
            border-radius: 20px; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div class="instruction">Chargement du village (22 Mo)...</div>

    <model-viewer 
        src="model.splat" 
        camera-controls 
        touch-action="none" 
        disable-zoom="false"
        loading="eager"
        alt="Vue 3D de Seraincourt">
    </model-viewer>

</body>
</html>
