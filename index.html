<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://quadjr.github.io/aframe-gaussian-splatting/index.js"></script>
  </head>
  <body style="margin: 0; background-color: #000;">
    <a-scene>
      <!-- On place le modèle au centre 0 0 0 -->
      <a-entity gaussian_splatting="src: model.splat;" position="0 0 0" rotation="0 0 0"></a-entity>

      <!-- On met la caméra très loin (50 mètres en arrière et 20 mètres en haut) pour voir où est le village -->
      <a-entity camera look-controls wasd-controls position="0 20 50"></a-entity>
    </a-scene>
  </body>
</html>
