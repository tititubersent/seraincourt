<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Seraincourt 3D</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
  </style>
</head>
<body>

<script type="module">
import * as SPLAT from './viewer.js';

const scene = new SPLAT.Scene();
const camera = new SPLAT.Camera();
const renderer = new SPLAT.WebGLRenderer();

document.body.appendChild(renderer.domElement);

// ✅ charge ton fichier
const splat = await SPLAT.Loader.load('./model.splat');
scene.add(splat);

// ✅ position caméra (important)
camera.position.set(0, 0, 3);

// rendu
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

</script>

</body>
</html>
