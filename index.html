<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Seraincourt 3D</title>
    <!-- On utilise des versions ultra-stables des scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://quadjr.github.io/aframe-gaussian-splatting/index.js"></script>
    <style>
        body { margin: 0; background-color: #87CEEB; } /* Fond bleu ciel */
        #instructions {
            position: absolute; bottom: 10px; width: 100%;
            text-align: center; color: white; text-shadow: 1px 1px 2px black;
            z-index: 10; font-family: sans-serif; pointer-events: none;
        }
    </style>
  </head>
  <body>
    <div id="instructions">Souris pour tourner | ZQSD pour bouger</div>

    <a-scene render-order="background, content">
      <!-- Un ciel pour ne plus être dans le noir -->
      <a-sky color="#87CEEB"></a-sky>

      <!-- LE VILLAGE : On ajuste la position et l'échelle pour qu'il soit bien visible -->
      <a-entity 
        gaussian_splatting="src: model.splat;" 
        rotation="0 0 0" 
        position="0 1.5 -5"
        scale="2 2 2">
      </a-entity>

      <!-- LA CAMÉRA -->
      <a-entity camera look-controls wasd-controls="acceleration: 20" position="0 1.6 0"></a-entity>
    </a-scene>
  </body>
</html>
