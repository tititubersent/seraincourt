<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village de Seraincourt 3D</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px;
            z-index: 100; text-align: center; color: white; border: 1px solid #3498db;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div id="status">Chargement du village...</div>
        <div id="percent" style="font-size: 24px; font-weight: bold; color: #3498db;">0%</div>
    </div>
    
    <canvas id="canvas"></canvas>

    <script type="module">
        // On utilise une version stable bien précise
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@1.1.2/dist/index.es.min.js";

        async function main() {
            const canvas = document.getElementById("canvas");
            const renderer = new SPLAT.WebGLRenderer(canvas);
            const scene = new SPLAT.Scene();
            const camera = new SPLAT.Camera();
            const controls = new SPLAT.OrbitControls(camera, canvas);

            renderer.setSize(window.innerWidth, window.innerHeight);
            // Fond gris foncé pour mieux voir le modèle
            renderer.backgroundColor = new SPLAT.Color(0.1, 0.1, 0.1);

            try {
                console.log("Déchargement du fichier...");
                const splat = await SPLAT.Loader.LoadAsync("model.splat", scene, (p) => {
                    document.getElementById("percent").innerText = Math.round(p * 100) + "%";
                });

                document.getElementById("loader").style.display = "none";
                console.log("Chargement terminé !");

                // On place la caméra très loin pour être sûr de voir quelque chose
                camera.position = new SPLAT.Vector3(0, 30, 100);
                controls.target = new SPLAT.Vector3(0, 0, 0);

                const frame = () => {
                    controls.update();
                    renderer.render(scene, camera);
                    requestAnimationFrame(frame);
                };
                requestAnimationFrame(frame);

                // Si c'est toujours noir, essaie de bouger la souris ou de dézoomer
                console.log("Rendu démarré. Si c'est noir, dézoomez avec la molette.");

            } catch (error) {
                console.error("Erreur de rendu:", error);
                document.getElementById("status").innerText = "Erreur d'affichage";
            }

            window.addEventListener("resize", () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        main();
    </script>
</body>
</html>
