<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seraincourt 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #loader { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; z-index: 10; border: 1px solid #444; }
    </style>
</head>
<body>
    <div id="loader">Initialisation...</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        // Version 1.1.10 qui est la plus stable
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@1.1.10/dist/index.js";

        const canvas = document.getElementById("canvas");
        const loader = document.getElementById("loader");
        const renderer = new SPLAT.WebGLRenderer(canvas);
        const scene = new SPLAT.Scene();
        const camera = new SPLAT.Camera();
        const controls = new SPLAT.OrbitControls(camera, canvas);

        camera.position.z = 5;

        async function main() {
            try {
                const url = "./model.splat";
                loader.innerHTML = "Téléchargement du modèle...";
                
                await SPLAT.Loader.LoadAsync(url, scene, (progress) => {
                    loader.innerHTML = "Chargement : " + (progress * 100).toFixed(0) + "%";
                });
                
                loader.style.display = "none";
            } catch (e) {
                loader.innerHTML = "Erreur : Fichier mal lu ou corrompu.<br>Vérifie que model.splat fait bien 20Mo sur GitHub.";
                console.error(e);
            }

            function frame() {
                controls.update();
                renderer.render(scene, camera);
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }

        main();

        window.addEventListener("resize", () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
