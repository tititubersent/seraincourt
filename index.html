<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seraincourt 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #loader { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; z-index: 10; border: 1px solid #555; }
    </style>
</head>
<body>
    <div id="loader">Initialisation du village...</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        // On passe à la version 1.3.0 (beaucoup plus stable)
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@1.3.0/dist/index.js";

        const canvas = document.getElementById("canvas");
        const loader = document.getElementById("loader");
        const renderer = new SPLAT.WebGLRenderer(canvas);
        const scene = new SPLAT.Scene();
        const camera = new SPLAT.Camera();
        const controls = new SPLAT.OrbitControls(camera, canvas);

        async function main() {
            const url = "./model.splat";
            
            try {
                loader.innerHTML = "Téléchargement (59 Mo)...";

                // Le nouveau chargeur auto-détecte le format (Splat ou PLY)
                await SPLAT.Loader.LoadAsync(url, scene, (progress) => {
                    loader.innerHTML = "Chargement : " + (progress * 100).toFixed(0) + "%";
                });
                
                loader.innerHTML = "Finalisation de l'affichage...";
                // On attend une demi-seconde pour laisser la carte graphique respirer
                await new Promise(r => setTimeout(r, 500));
                
                loader.style.display = "none";
            } catch (e) {
                console.error(e);
                loader.innerHTML = "❌ ERREUR DE LECTURE<br><br>Le fichier est là mais mal lu.<br>Essaye de le renommer en <b>model.ply</b> sur GitHub et dans le code si ça persiste.";
            }

            function frame() {
                controls.update();
                renderer.render(scene, camera);
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }

        main();

        window.addEventListener("resize", () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
