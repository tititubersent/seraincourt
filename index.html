<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Seraincourt 3D</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://quadjr.github.io/aframe-gaussian-splatting/index.js"></script>
  </head>
  <body style="margin: 0; background-color: #87CEEB;">
    
    <div style="position: absolute; top: 10px; left: 10px; color: white; z-index: 100; font-family: sans-serif; background: rgba(0,0,0,0.5); padding: 10px;">
        Le fichier est chargé ! <br>
        Utilise la **SOURIS** pour regarder tout autour de toi (en haut, en bas, derrière). <br>
        Utilise **ZQSD** pour avancer si tu vois le village au loin.
    </div>

    <a-scene>
      <a-sky color="#87CEEB"></a-sky>

      <!-- On remet le village exactement comme quand il était visible (position 0) -->
      <a-entity gaussian_splatting="src: model.splat;" position="0 0 0" rotation="0 0 0"></a-entity>

      <!-- On place la caméra un peu en retrait pour avoir une vue d'ensemble -->
      <a-entity camera look-controls wasd-controls="acceleration: 50" position="0 5 20"></a-entity>
    </a-scene>
  </body>
</html>
