<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Splat Viewer</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script type="module">
import { Viewer } from "https://unpkg.com/gaussian-splats-3d@latest/build/gaussian-splats-3d.module.js";

const viewer = new Viewer({
  canvas: document.getElementById("canvas"),
  cameraUp: [0, -1, -0.6],
  initialCameraPosition: [-5, -1, -1],
  initialCameraLookAt: [0, 0, 0]
});

viewer.addSplatScene(
  "https://github.com/tititubersent/seraincourt/raw/refs/heads/main/model.splat",
  { progressiveLoad: true }
).then(() => {
  viewer.start();
}).catch((e) => {
  console.error("Erreur :", e);
});
</script>

</body>
</html>
