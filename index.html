<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Village de Seraincourt 3D</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; z-index: 10; }
        .progress { width: 200px; height: 4px; background: #333; margin-top: 10px; }
        #bar { width: 0%; height: 100%; background: #00ff88; }
    </style>
</head>
<body>
    <div id="loader">
        <div id="status">Chargement du village...</div>
        <div class="progress"><div id="bar"></div></div>
    </div>
    <canvas id="canvas" style="width: 100vw; height: 100vh;"></canvas>

    <script type="module">
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@1.2.0/dist/index.js";

        const canvas = document.getElementById("canvas");
        const bar = document.getElementById("bar");
        const status = document.getElementById("status");

        // REMPLACE LE LIEN CI-DESSOUS par celui que tu as copié à l'étape 1.6
        const urlFichier = "MET_TON_LIEN_ICI_ENTRE_LES_GUILLEMETS";

        async function start() {
            const renderer = new SPLAT.WebGLRenderer(canvas);
            const scene = new SPLAT.Scene();
            const camera = new SPLAT.Camera();
            const controls = new SPLAT.OrbitControls(camera, canvas);

            try {
                await SPLAT.Loader.LoadAsync(urlFichier, scene, (p) => {
                    bar.style.width = (p * 100) + "%";
                });

                document.getElementById("loader").style.display = "none";

                const frame = () => {
                    controls.update();
                    renderer.render(scene, camera);
                    requestAnimationFrame(frame);
                };
                requestAnimationFrame(frame);
            } catch (e) {
                status.innerText = "Erreur de chargement. Vérifie le lien du fichier.";
                console.error(e);
            }
        }

        start();
    </script>
</body>
</html>
