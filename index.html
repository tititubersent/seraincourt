<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village de Seraincourt 3D</title>
    <style>
        body { margin: 0; background-color: #0b0e14; overflow: hidden; font-family: sans-serif; color: white; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 15px;
            z-index: 100; text-align: center; border: 1px solid #3498db;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div style="font-size: 20px; margin-bottom: 10px;">Chargement du Village...</div>
        <div id="percent" style="font-size: 30px; font-weight: bold; color: #3498db;">0%</div>
    </div>
    
    <canvas id="canvas"></canvas>

    <script type="module">
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@latest/dist/index.es.min.js";

        const canvas = document.getElementById("canvas");
        const loader = document.getElementById("loader");
        const percent = document.getElementById("percent");

        async function main() {
            // Initialisation
            const renderer = new SPLAT.WebGLRenderer(canvas);
            const scene = new SPLAT.Scene();
            const camera = new SPLAT.Camera();
            const controls = new SPLAT.OrbitControls(camera, canvas);

            renderer.setSize(window.innerWidth, window.innerHeight);

            try {
                // Chargement du modèle
                const splat = await SPLAT.Loader.LoadAsync("model.splat", scene, (p) => {
                    percent.innerText = Math.round(p * 100) + "%";
                });

                // Une fois chargé, on cache le texte de chargement
                loader.style.display = "none";

                // pour qu'il soit pile devant la caméra.

                splat.position = new SPLAT.Vector3(-center.x, -center.y, -center.z);
