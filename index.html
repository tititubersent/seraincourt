<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village de Seraincourt 3D</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        /* Style du lecteur pour qu'il prenne tout l'écran */
        luma-splat {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <!-- On utilise le moteur de Luma AI, beaucoup plus tolérant -->
    <script type="module" src="https://unpkg.com/@lumaai/luma-web@0.2.0/dist/library/luma-web.module.js"></script>

    <luma-splat 
        src="model.splat" 
        loading="eager"
        background-color="#000000"
        alpha-background="false">
    </luma-splat>

</body>
</html>
