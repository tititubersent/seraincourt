<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seraincourt 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #loader { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; z-index: 10; }
    </style>
</head>
<body>
    <div id="loader">Connexion au moteur 3D...</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        // J'ai mis à jour ce lien vers une version stable qui fonctionne
        import * as SPLAT from "https://unpkg.com/gsplat@1.2.0/dist/index.js";

        const canvas = document.getElementById("canvas");
        const loader = document.getElementById("loader");
        const renderer = new SPLAT.WebGLRenderer(canvas);
        const scene = new SPLAT.Scene();
        const camera = new SPLAT.Camera();
        const controls = new SPLAT.OrbitControls(camera, canvas);

        camera.position.z = 5;

        async function main() {
            const url = "./model.splat"; 
            try {
                loader.innerHTML = "Téléchargement du modèle (20Mo)...";
                await SPLAT.Loader.LoadAsync(url, scene, (progress) => {
                    loader.innerHTML = "Chargement : " + (progress * 100).toFixed(0) + "%";
                });
                loader.style.display = "none";
            } catch (e) {
                loader.innerHTML = "Erreur : " + e.message;
                console.error(e);
            }

            function frame() {
                controls.update();
                renderer.render(scene, camera);
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }

        main();

        window.addEventListener("resize", () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
