<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village de Seraincourt 3D</title>
    <style>
        body { margin: 0; background-color: #1a1a2e; overflow: hidden; font-family: sans-serif; color: white; }
        canvas { width: 100vw; height: 100vh; display: block; }
        .ui {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 15px 25px; border-radius: 30px;
            z-index: 10; text-align: center; border: 1px solid #444;
        }
    </style>
</head>
<body>

    <div class="ui">
        <span id="label">Initialisation du radar...</span>
    </div>
    
    <canvas id="canvas"></canvas>

    <script type="module">
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@latest/dist/index.es.min.js";

        const canvas = document.getElementById("canvas");
        const label = document.getElementById("label");

        async function main() {
            const renderer = new SPLAT.WebGLRenderer(canvas);
            const scene = new SPLAT.Scene();
            const camera = new SPLAT.Camera();
            const controls = new SPLAT.OrbitControls(camera, canvas);

            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.backgroundColor = new SPLAT.Color32(26, 26, 46, 255); // Fond bleu nuit

            try {
                const splat = await SPLAT.Loader.LoadAsync("model.splat", scene, (p) => {
                    label.innerText = "Chargement du village : " + Math.round(p * 100) + "%";
                });

                label.innerText = "Village trouvé ! Tentative de centrage...";

                // --- LE RADAR : On cherche le centre réel du modèle ---
                setTimeout(() => {
                    // On demande au moteur de calculer la position moyenne des points
                    const center = splat.data.avgPosition; 
                    
                    if (center) {
                        // On téléporte la caméra face au modèle
                        camera.position = new SPLAT.Vector3(center.x, center.y, center.z + 10);
                        controls.target = new SPLAT.Vector3(center.x, center.y, center.z);
                        label.innerText = "Village centré ! Explorez avec la souris.";
                    } else {
                        // Si le calcul auto échoue, on recule très loin
                        camera.position = new SPLAT.Vector3(0, 10, 50);
                        label.innerText = "Village chargé. Reculez (molette) pour le voir.";
                    }
                }, 500);

                const frame = () => {
                    controls.update();
                    renderer.render(scene, camera);
                    requestAnimationFrame(frame);
                };

                window.addEventListener("resize", () => {
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });

                requestAnimationFrame(frame);

            } catch (error) {
                label.innerText = "Erreur de lecture du fichier.";
                console.error(error);
            }
        }

        main();
    </script>
</body>
</html>
