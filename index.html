<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seraincourt 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #loader { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0,0,0,0.8); padding: 20px; 
            border-radius: 10px; z-index: 100; border: 1px solid #444;
        }
    </style>
</head>
<body>
    <div id="loader">Chargement du moteur 3D...</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        // Nouveau lien beaucoup plus stable
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@1.2.0/dist/index.js";

        const canvas = document.getElementById("canvas");
        const loader = document.getElementById("loader");

        async function main() {
            try {
                const renderer = new SPLAT.WebGLRenderer(canvas);
                const scene = new SPLAT.Scene();
                const camera = new SPLAT.Camera();
                const controls = new SPLAT.OrbitControls(camera, canvas);

                loader.innerHTML = "Recherche du fichier .splat...";

                // On vérifie si le fichier existe avant de le charger
                const response = await fetch("./model.splat");
                if (!response.ok) throw new Error("Fichier model.splat introuvable (Erreur " + response.status + ")");

                loader.innerHTML = "Téléchargement du village (59 Mo)...";

                await SPLAT.Loader.LoadAsync("./model.splat", scene, (progress) => {
                    loader.innerHTML = "Chargement : " + (progress * 100).toFixed(0) + "%";
                });

                loader.style.display = "none";

                function frame() {
                    controls.update();
                    renderer.render(scene, camera);
                    requestAnimationFrame(frame);
                }
                requestAnimationFrame(frame);

            } catch (err) {
                console.error(err);
                loader.innerHTML = "❌ ERREUR : " + err.message + "<br><br>Vérifie que 'model.splat' est bien écrit en minuscules sur GitHub.";
            }
        }

        main();

        window.addEventListener("resize", () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
