<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Village 3D</title>
    <style>
        body { margin: 0; background-color: #111; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: sans-serif; text-align: center;
        }
    </style>
</head>
<body>
    <div id="loader">Chargement : <span id="percent">0%</span></div>
    <canvas id="canvas"></canvas>

    <script type="module">
        // LIEN CORRIGÉ (Vérifié 404)
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@1.1.9/dist/index.es.js";

        const canvas = document.getElementById("canvas");
        const renderer = new SPLAT.WebGLRenderer(canvas);
        const scene = new SPLAT.Scene();
        const camera = new SPLAT.Camera();
        const controls = new SPLAT.OrbitControls(camera, canvas);

        async function load() {
            try {
                const splat = await SPLAT.Loader.LoadAsync("model.splat", scene, (p) => {
                    document.getElementById("percent").innerText = Math.round(p * 100) + "%";
                });
                
                document.getElementById("loader").style.display = "none";
                
                // Placement automatique de la caméra
                camera.position = new SPLAT.Vector3(0, 10, 50);
                
                const frame = () => {
                    controls.update();
                    renderer.render(scene, camera);
                    requestAnimationFrame(frame);
                };
                requestAnimationFrame(frame);
            } catch (e) {
                document.getElementById("loader").innerText = "Erreur de chargement du fichier .splat";
                console.error(e);
            }
        }

        load();

        window.addEventListener("resize", () => renderer.setSize(window.innerWidth, window.innerHeight));
    </script>
</body>
</html>
