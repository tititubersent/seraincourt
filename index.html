<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Village de Seraincourt 3D</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #status { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; background: rgba(20,20,20,0.9); padding: 30px; 
            border: 2px solid #444; border-radius: 15px; z-index: 10; min-width: 250px;
        }
        .progress-bar { width: 100%; height: 10px; background: #222; margin-top: 10px; border-radius: 5px; }
        #fill { width: 0%; height: 100%; background: #00ff88; border-radius: 5px; transition: width 0.2s; }
    </style>
</head>
<body>
    <div id="status">
        <div id="msg">Initialisation du moteur 3D...</div>
        <div class="progress-bar"><div id="fill"></div></div>
    </div>
    <canvas id="canvas" style="width: 100vw; height: 100vh;"></canvas>

    <script type="module">
        // On utilise un lien de secours ultra-fiable
        import * as SPLAT from "https://unpkg.com/gsplat@1.2.0/dist/index.js";

        const msg = document.getElementById("msg");
        const fill = document.getElementById("fill");

        async function start() {
            try {
                const renderer = new SPLAT.WebGLRenderer(document.getElementById("canvas"));
                const scene = new SPLAT.Scene();
                const camera = new SPLAT.Camera();
                const controls = new SPLAT.OrbitControls(camera, renderer.canvas);
                
                msg.innerText = "Chargement du village (59 Mo)...";

                // Le ?v=60 force GitHub à envoyer le fichier frais, sans cache
                await SPLAT.Loader.LoadAsync("./model.splat?v=60", scene, (p) => {
                    const pct = Math.round(p * 100);
                    msg.innerText = "Chargement : " + pct + "%";
                    fill.style.width = pct + "%";
                });

                document.getElementById("status").style.display = "none";

                const frame = () => {
                    controls.update();
                    renderer.render(scene, camera);
                    requestAnimationFrame(frame);
                };
                requestAnimationFrame(frame);

            } catch (e) {
                msg.innerHTML = "❌ ERREUR : Le fichier model.splat est introuvable ou mal nommé sur GitHub.";
                console.error(e);
            }
        }

        start();
    </script>
</body>
</html>
